run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor/
    - third_party/
    - .gen/

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - typecheck
    - gosec
    - prealloc
    - unconvert
    - gocritic
    - revive
    - misspell
    - bodyclose
    - noctx
    - durationcheck
    - exportloopref
    - gocyclo
    - goimports
    - lll
    - nakedret
    - nilerr
    - predeclared
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    - whitespace
  disable:
    - exhaustruct
    - exhaustivestruct
    - funlen
    - varnamelen

linters-settings:
  gofmt:
    simplify: true

  govet:
    check-shadowing: true
    enable:
      - fieldalignment
      - nilness
      - shadow
      - sortslice
      - unusedwrite

  gosec:
    excludes:
      - G107
      - G404

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - ifElseChain
      - wrapperFunc
      - commentFormatting
      - unnamedResult

  revive:
    rules:
      - name: exported
        severity: error
      - name: blank-imports
        severity: error
      - name: context-as-argument
        severity: error
      - name: context-keys-type
        severity: error
      - name: deep-exit
        severity: error
      - name: dot-imports
        severity: error
      - name: error-return
        severity: error
      - name: error-strings
        severity: error
      - name: error-naming
        severity: error
      - name: if-return
        severity: error
      - name: increment-decrement
        severity: error
      - name: var-naming
        severity: error
      - name: var-declaration
        severity: error
      - name: package-comments
        severity: error
      - name: range
        severity: error
      - name: receiver-naming
        severity: error
      - name: time-naming
        severity: error
      - name: unexported-return
        severity: error
      - name: indent-error-flow
        severity: error
      - name: errorf
        severity: error
      - name: empty-block
        severity: error
      - name: superfluous-else
        severity: error
      - name: unused-parameter
        severity: warning
      - name: unreachable-code
        severity: error
      - name: redefines-builtin-id
        severity: error

  misspell:
    locale: US

  lll:
    line-length: 140

  gocyclo:
    min-complexity: 15

  nakedret:
    max-func-lines: 30

  prealloc:
    simple: true
    range-loops: true
    for-loops: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false

  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - gosec
        - lll
        - dupl
        - funlen

    - path: internal/api/
      linters:
        - lll

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true
