name: CI

on:
  push:
    branches: [main, fix/bugs, fix/security-critical]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.25'
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l -s .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build proxy
        run: go build -o /tmp/fortresswaf ./cmd/proxy

    - name: Verify binary
      run: file /tmp/fortresswaf && ls -lh /tmp/fortresswaf

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test ./... -v -count=1

  test-python:
    name: Test Python ML Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd ml-engine
          pip install -r requirements.txt -q 2>/dev/null || pip install fastapi uvicorn pydantic scikit-learn torch transformers numpy pandas redis prometheus-client grpcio protobuf httpx pytest -q

      - name: Test Python imports
        run: |
          cd ml-engine
          python tests/test_imports.py

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd dashboard
          npm install --silent 2>/dev/null

      - name: TypeScript check
        run: |
          cd dashboard
          npx tsc --noEmit --project tsconfig.json
