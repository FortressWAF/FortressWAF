name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: '1.22'
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./... --timeout=10m

      - name: Check go fmt
        run: |
          gofmt -l -s .
          test -z "$(gofmt -l -s . | tee /dev/stderr)" || exit 1

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff bandit safety
          cd ml-engine && pip install -r requirements.txt -q

      - name: Run ruff
        run: ruff check ml-engine/ --output-format=github --no-fix

      - name: Run bandit
        run: bandit -r ml-engine/ -f github --no-progress

      - name: Safety check
        run: safety check --stdin || true

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: cd dashboard && npm ci --silent

      - name: Run ESLint
        run: cd dashboard && npm run lint -- --format=github --max-warnings=0

      - name: TypeScript check
        run: cd dashboard && npx tsc --noEmit --project tsconfig.json

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fortresswaf_test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

      - name: Run attack corpus tests
        run: |
          go test ./internal/engine/... -run TestAttackCorpus -v

  test-python:
    name: Test Python ML Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd ml-engine
          pip install -r requirements.txt -q
          pip install pytest pytest-asyncio httpx -q

      - name: Run pytest
        run: cd ml-engine && python -m pytest test_api.py -v --tb=short

      - name: Test ML model imports
        run: cd ml-engine && python -c "from models.anomaly import AnomalyDetector; from models.classifier import AttackClassifier; from models.bot_detector import BotDetector; from models.risk_scorer import RiskScorer; print('All models import OK')"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: cd dashboard && npm ci --silent

      - name: Run tests
        run: cd dashboard && npm test -- --watchAll=false --coverage --coverageReporters=text-summary

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fortresswaf/proxy:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fortresswaf/proxy:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt json -out gosec-results.json ./... || true

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [lint-go, test-go]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build proxy
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o bin/fortress-proxy-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/proxy

      - name: Build CLI
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o bin/fortressctl-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ctl

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fortresswaf-binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/*

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-go, test-go]
    strategy:
      matrix:
        component: [proxy, ml-engine, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push proxy
        if: matrix.component == 'proxy'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            fortresswaf/proxy:${{ github.sha }}
            fortresswaf/proxy:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ML engine
        if: matrix.component == 'ml-engine'
        uses: docker/build-push-action@v5
        with:
          context: ./ml-engine
          file: ./ml-engine/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            fortresswaf/ml-engine:${{ github.sha }}
            fortresswaf/ml-engine:latest
          platforms: linux/amd64,linux/arm64

      - name: Build and push dashboard
        if: matrix.component == 'dashboard'
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            fortresswaf/dashboard:${{ github.sha }}
            fortresswaf/dashboard:latest
          platforms: linux/amd64

  attack-corpus-test:
    name: Attack Corpus Validation
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: go build -o fortress-proxy ./cmd/proxy

      - name: Run attack corpus test
        run: |
          echo "Running attack corpus validation..."
          # go test ./tests/integration/... -run TestAttackCorpus -v

      - name: Run false positive test
        run: |
          echo "Running false positive validation..."
