name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Release v${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean --timeout 60m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: fortresswaf/proxy:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Sign images
        run: |
          cosign sign --yes fortresswaf/proxy:${{ github.ref_name }}
          cosign sign --yes fortresswaf/ml-engine:${{ github.ref_name }}
          cosign sign --yes fortresswaf/dashboard:${{ github.ref_name }}

      - name: Publish Helm chart
        run: |
          helm package deploy/helm/

      - name: Publish Docker images (multi-arch)
        run: |
          docker buildx imagetools create \
            fortresswaf/proxy:${{ github.ref_name }} \
            --tag fortresswaf/proxy:${{ github.ref_name }}
