# Auto-label PRs based on changed files (v5+ format)
fortress-engine:
  - changed-files:
    - any-glob-to-any-file:
      - internal/engine/**/*

fortress-api:
  - changed-files:
    - any-glob-to-any-file:
      - internal/api/**/*

fortress-config:
  - changed-files:
    - any-glob-to-any-file:
      - internal/config/**/*

fortress-proxy:
  - changed-files:
    - any-glob-to-any-file:
      - cmd/proxy/**/*

fortress-reputation:
  - changed-files:
    - any-glob-to-any-file:
      - internal/reputation/**/*

fortress-ratelimit:
  - changed-files:
    - any-glob-to-any-file:
      - internal/ratelimit/**/*

fortress-siem:
  - changed-files:
    - any-glob-to-any-file:
      - internal/siem/**/*

fortress-ci:
  - changed-files:
    - any-glob-to-any-file:
      - .github/workflows/**/*
      - .github/labeler.yml
      - .github/labels.yml

fortress-docs:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - '**/docs/**/*'

fortress-security:
  - changed-files:
    - any-glob-to-any-file:
      - '**/auth*.go'
      - '**/mtls*.go'
      - '**/jwt*.go'
      - '**/oauth*.go'
