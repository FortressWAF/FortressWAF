# Auto-label PRs based on changed files
fortress-engine:
  - internal/engine/**/*

fortress-api:
  - internal/api/**/*

fortress-config:
  - internal/config/**/*

fortress-proxy:
  - cmd/proxy/**/*

fortress-reputation:
  - internal/reputation/**/*

fortress-ratelimit:
  - internal/ratelimit/**/*

fortress-siem:
  - internal/siem/**/*

fortress-ci:
  - .github/workflows/**/*
  - .github/labeler.yml
  - .github/labels.yml

fortress-docs:
  - '**/*.md'
  - '**/docs/**/*'

fortress-security:
  - '**/auth*.go'
  - '**/mtls*.go'
  - '**/jwt*.go'
  - '**/oauth*.go'
