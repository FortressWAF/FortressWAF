# Labels for issues and PRs — fortress- prefix for project-specific labels

# Type
- name: fortress-bug
  color: d73a4a
  description: Bug fix

- name: fortress-security
  color: e11d21
  description: Security vulnerability or fix

- name: fortress-enhancement
  color: a2eeef
  description: New feature or improvement

- name: fortress-refactoring
  color: fbca04
  description: Code restructure without functional change

- name: fortress-performance
  color: 0e8a16
  description: Performance optimization

- name: fortress-docs
  color: 0075ca
  description: Documentation

- name: fortress-testing
  color: 5319e7
  description: Adding or fixing tests

- name: fortress-ci
  color: 1d76db
  description: CI/CD changes

# Severity
- name: fortress-critical
  color: b60205
  description: Critical severity

- name: fortress-high
  color: d93f0b
  description: High severity

- name: fortress-medium
  color: fbca04
  description: Medium severity

- name: fortress-low
  color: 0e8a16
  description: Low severity
