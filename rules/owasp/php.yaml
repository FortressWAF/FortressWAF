- id: "FORTRESS-PHP-001"
  name: "PHP Attack - File Upload Shell"
  severity: critical
  tags: ["php", "owasp-a03", "webshell", "upload"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(Content-Disposition\s*:.*filename=.*\.(php\d*|phtml|pht|php\d{2}|shtml|phar|php\.suspected|php\..*))'
      - field: request.path
        operator: regex
        pattern: '(?i)(upload|file|import|media|attachment)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-PHP-001"}'
  log: true
  alert: true

- id: "FORTRESS-PHP-002"
  name: "PHP Attack - Disable Functions / Configuration"
  severity: critical
  tags: ["php", "owasp-a03", "rce"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(ini_set\s*\(|set_time_limit|ignore_user_abort|dl\s*\(|php_value|php_admin_value|php_flag)'
      - field: request.query
        operator: regex
        pattern: '(?i)(ini_set\s*\(|set_time_limit|ignore_user_abort|dl\s*\(|php_value|php_admin_value|php_flag)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-PHP-002"}'
  log: true
  alert: true

- id: "FORTRESS-PHP-003"
