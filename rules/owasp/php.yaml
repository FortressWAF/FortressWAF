- id: "FORTRESS-PHP-004"
  name: "PHP Attack - Code Evaluation"
  severity: critical
  tags: ["php", "owasp-a03", "eval"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(eval\s*\(|assert\s*\(|preg_replace\s*\(\s*["'"'"'].*e["'"'"']\s*[,\)]|create_function\s*\(|call_user_func\s*\(|call_user_func_array\s*\()'
      - field: request.query
        operator: regex
        pattern: '(?i)(eval\s*\(|assert\s*\(|preg_replace\s*\(\s*["'"'"'].*e["'"'"']\s*[,\)]|create_function\s*\(|call_user_func\s*\(|call_user_func_array\s*\()'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-PHP-004"}'
  log: true
  alert: true

