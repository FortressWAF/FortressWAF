- id: "FORTRESS-JAVA-001"
  name: "Java Attack - Runtime.exec / ProcessBuilder"
  severity: critical
  tags: ["java", "owasp-a03", "rce"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(Runtime\s*\.\s*getRuntime\s*\(|ProcessBuilder\s*\(|java\.lang\.Runtime|\..*exec\s*\(|subprocess)'
      - field: request.query
        operator: regex
        pattern: '(?i)(Runtime\s*\.\s*getRuntime\s*\(|ProcessBuilder\s*\(|java\.lang\.Runtime|\..*exec\s*\(|subprocess)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-JAVA-001"}'
  log: true
  alert: true

- id: "FORTRESS-JAVA-002"
  name: "Java Attack - JNDI/LDAP Injection"
  severity: critical
  tags: ["java", "owasp-a03", "jndi", "log4j"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(\$jndi:|\$\{jndi:|javax\.naming|InitialContext|JndiLookup|Context\.lookup|rmi:|ldap:|ldaps:|iiop:|corba:|nds:)'
      - field: request.query
        operator: regex
        pattern: '(?i)(\$jndi:|\$\{jndi:|javax\.naming|InitialContext|JndiLookup|Context\.lookup|rmi:|ldap:|ldaps:|iiop:|corba:|nds:)'
      - field: request.headers
        operator: regex
        pattern: '(?i)(\$\{jndi:|rmi:|ldap:)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-JAVA-002"}'
  log: true
  alert: true

