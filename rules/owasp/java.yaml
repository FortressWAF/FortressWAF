        pattern: '(?i)(\$\{[\s\S]*?(Runtime|Process|exec|getRuntime|forName|invoke|getMethod|getDeclaredMethod|AccessController)\}|#\{[\s\S]*?(Runtime|Process|exec|getRuntime)\})'
  action: block
  response:
