- id: "FORTRESS-SQLI-006"
  name: "SQL Injection - Stored Procedure Injection"
  severity: critical
  tags: ["sqli", "owasp-a03", "stored-proc"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(exec\s+|\bxp_\s*|sp_executesql|sp_prepare|call\s+\w+\s*\()'
      - field: request.query
        operator: regex
        pattern: '(?i)(exec\s+|\bxp_\s*|sp_executesql|sp_prepare|call\s+\w+\s*\()'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-SQLI-006"}'
  log: true
  alert: true

- id: "FORTRESS-SQLI-007"
  name: "SQL Injection - Hex/String Encoding Evasion"
  severity: high
  tags: ["sqli", "owasp-a03", "evasion"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(0x[0-9a-f]{4,}|char\s*\(\s*\d+\s*\)|nchar\s*\(\s*\d+\s*\)|unhex\s*\(|unhex\()'
      - field: request.query
        operator: regex
        pattern: '(?i)(0x[0-9a-f]{4,}|char\s*\(\s*\d+\s*\)|nchar\s*\(\s*\d+\s*\)|unhex\s*\(|unhex\()'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-SQLI-007"}'
  log: true
  alert: true

