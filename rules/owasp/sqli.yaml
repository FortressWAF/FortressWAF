- id: "FORTRESS-SQLI-001"
  name: "SQL Injection - UNION SELECT"
  severity: critical
  tags: ["sqli", "owasp-a03", "pci-dss"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(union\s+(all\s+)?select)'
      - field: request.query
        operator: regex
        pattern: '(?i)(union\s+(all\s+)?select)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-SQLI-001"}'
  log: true
  alert: true

- id: "FORTRESS-SQLI-002"
  name: "SQL Injection - OR/AND 1=1"
  severity: critical
  tags: ["sqli", "owasp-a03", "pci-dss"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)((\bor\b|\band\b)\s+[\d\w]+\s*=\s*[\d\w]+)'
      - field: request.query
        operator: regex
        pattern: '(?i)((\bor\b|\band\b)\s+[\d\w]+\s*=\s*[\d\w]+)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-SQLI-002"}'
  log: true
  alert: true

- id: "FORTRESS-SQLI-003"
  name: "SQL Injection - Sleep/Pause"
  severity: critical
  tags: ["sqli", "owasp-a03", "blind-sqli"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(sleep\s*\(\s*\d+\s*\)|waitfor\s+delay|pg_sleep|dbms_lock\.sleep)'
      - field: request.query
        operator: regex
        pattern: '(?i)(sleep\s*\(\s*\d+\s*\)|waitfor\s+delay|pg_sleep|dbms_lock\.sleep)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-SQLI-003"}'
  log: true
  alert: true

