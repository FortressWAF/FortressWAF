- id: "FORTRESS-SCAN-009"
  name: "Scanner Detection - Rapid Rate Probing"
  severity: low
  tags: ["scanner", "rate-based"]
  condition:
    any:
      - field: request.path
        operator: regex
        pattern: '(?i)(\.(php|aspx|jsp|do|action|cgi|pl|asp)$)'
  action: log
  response:
    code: 200
  log: true
  alert: false

- id: "FORTRESS-SCAN-010"
  name: "Scanner Detection - Common Probe Patterns"
  severity: medium
  tags: ["scanner", "probe"]
  condition:
    any:
      - field: request.path
        operator: regex
        pattern: '(?i)(\/(phpinfo|info|phpunit|debug|test|shell|cmd|exec|cgi-bin|server-status|server-info)\b)'
      - field: request.query
        operator: regex
        pattern: '(?i)((SELECT|DROP|DELETE|INSERT|ALTER|CREATE|UNION).*(FROM|INTO|TABLE|DATABASE)|(\bOR\b|\bAND\b)\s+\d+\s*=\s*\d+)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-SCAN-010"}'
  log: true
  alert: true
