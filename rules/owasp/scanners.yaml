- id: "FORTRESS-SCAN-001"
  name: "Scanner Detection - Acunetix"
  severity: medium
  tags: ["scanner", "fingerprint"]
  condition:
    any:
      - field: request.headers
        operator: regex
        pattern: '(?i)(Acunetix|Acunetix-Aspect|acunetix-product-token|acunetix-product)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-SCAN-001"}'
  log: true
  alert: true

