- id: "FORTRESS-SCAN-007"
  name: "Scanner Detection - GoBuster/FFUF/DirBuster"
  severity: low
  tags: ["scanner", "directory-buster"]
  condition:
    any:
      - field: request.headers
        operator: regex
        pattern: '(?i)(gobuster|ffuf|dirbuster|dirb|wfuzz|gospider)'
      - field: request.path
        operator: regex
        pattern: '(?i)(\/(admin|backup|config|db|sql|dump|test|dev|private|secret|\.git|\.env|\.svn|\.htaccess|\.htpasswd|xmlrpc|wp-content|wp-includes|wp-admin)\b)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-SCAN-007"}'
  log: true
  alert: true

