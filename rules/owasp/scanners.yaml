- id: "FORTRESS-SCAN-004"
  name: "Scanner Detection - SQLMap"
  severity: high
  tags: ["scanner", "sqlmap", "sqli"]
  condition:
    any:
      - field: request.headers
        operator: regex
        pattern: '(?i)(sqlmap|sqlmap)'
      - field: request.query
        operator: regex
        pattern: '(?i)(\bsleep\b.*\b(if|or|and)\b.*\d|\bwaitfor\b|\bbenchmark\b.*\(.*\d)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-SCAN-004"}'
  log: true
  alert: true

