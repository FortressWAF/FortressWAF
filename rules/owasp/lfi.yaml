- id: "FORTRESS-LFI-001"
  name: "Local File Inclusion - Path Traversal"
  severity: critical
  tags: ["lfi", "owasp-a03", "pci-dss"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(\.\.\/|\.\.\\|%2e%2e%2f|%2e%2e%5c|\.\.%252f|%252e%252e%252f)'
      - field: request.query
        operator: regex
        pattern: '(?i)(\.\.\/|\.\.\\|%2e%2e%2f|%2e%2e%5c|\.\.%252f|%252e%252e%252f)'
      - field: request.path
        operator: regex
        pattern: '(?i)(\.\.\/|\.\.\\|%2e%2e%2f|%2e%2e%5c)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-LFI-001"}'
  log: true
  alert: true

- id: "FORTRESS-LFI-002"
  name: "Local File Inclusion - Sensitive Unix Files"
  severity: critical
  tags: ["lfi", "owasp-a03"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)(\/etc\/passwd|\/etc\/shadow|\/etc\/hosts|\/etc\/sudoers|\/etc\/ssh|\/root\/\.ssh|\/home\/.*\/\.ssh|\/var\/log\/auth|\/proc\/self\/environ|\/proc\/self\/fd)'
      - field: request.query
        operator: regex
        pattern: '(?i)(\/etc\/passwd|\/etc\/shadow|\/etc\/hosts|\/etc\/sudoers|\/etc\/ssh|\/root\/\.ssh|\/home\/.*\/\.ssh|\/var\/log\/auth|\/proc\/self\/environ|\/proc\/self\/fd)'
      - field: request.path
        operator: regex
        pattern: '(?i)(\/etc\/passwd|\/etc\/shadow|\/etc\/hosts|\/etc\/sudoers|\/root\/\.ssh|\/proc\/self)'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-LFI-002"}'
  log: true
  alert: true

