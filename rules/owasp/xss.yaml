- id: "FORTRESS-XSS-001"
  name: "Cross-Site Scripting - Script Tag Injection"
  severity: critical
  tags: ["xss", "owasp-a07", "pci-dss"]
  condition:
    any:
      - field: request.body
        operator: regex
        pattern: '(?i)<script[^>]*>.*?<\/script>'
      - field: request.query
        operator: regex
        pattern: '(?i)<script[^>]*>.*?<\/script>'
      - field: request.headers
        operator: regex
        pattern: '(?i)<script[^>]*>.*?<\/script>'
  action: block
  response:
    code: 403
    body: '{"error":"Blocked by FortressWAF","ref":"FORTRESS-XSS-001"}'
  log: true
  alert: true

