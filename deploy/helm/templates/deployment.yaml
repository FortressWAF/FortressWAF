apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fortresswaf.fullname" . }}-proxy
  labels:
    {{- include "fortresswaf.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.autoscaling }}
  {{- if .enabled }}
  replicas: {{ .minReplicas }}
  {{- end }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fortresswaf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: proxy
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "fortresswaf.labels" . | nindent 8 }}
        app.kubernetes.io/component: proxy
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fortresswaf.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.initContainers.proxy }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fortress-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 8443
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /etc/fortresswaf/config.yaml
            - name: REDIS_URL
              value: redis://:{{ .Values.secrets.redisPassword }}@{{ include "fortresswaf.fullname" .}}-redis:6379
            - name: DATABASE_URL
              value: postgres://fortress:{{ .Values.secrets.dbPassword }}@{{ include "fortresswaf.fullname" .}}-postgres:5432/fortresswaf
            - name: ML_ENGINE_URL
              value: http://{{ include "fortresswaf.fullname" .}}-ml-engine:8000
            - name: NATS_URL
              value: nats://{{ include "fortresswaf.fullname" .}}-nats:4222
            - name: ADMIN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fortresswaf.secretName" . }}
                  key: jwt-secret
            {{- with .Values.extraEnvVars.proxy }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/fortresswaf/config.yaml
              subPath: config.yaml
            - name: rules
              mountPath: /etc/fortresswaf/rules
            - name: data
              mountPath: /var/lib/fortresswaf
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            {{- toYaml .Values.resources.proxy | nindent 12 }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.sidecars.proxy }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "fortresswaf.fullname" . }}-config
        - name: rules
          configMap:
            name: {{ include "fortresswaf.fullname" . }}-rules
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "fortresswaf.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fortresswaf.fullname" . }}-ml-engine
  labels:
    {{- include "fortresswaf.labels" . | nindent 4 }}
    app.kubernetes.io/component: ml-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fortresswaf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ml-engine
  template:
    metadata:
      labels:
        {{- include "fortresswaf.labels" . | nindent 8 }}
        app.kubernetes.io/component: ml-engine
    spec:
      serviceAccountName: {{ include "fortresswaf.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers.ml }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ml-engine
          image: "{{ .Values.image.repository }}-ml:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: REDIS_URL
              value: redis://:{{ .Values.secrets.redisPassword }}@{{ include "fortresswaf.fullname" .}}-redis:6379
            - name: MODEL_DIR
              value: /app/models
            {{- with .Values.extraEnvVars.ml }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: models
              mountPath: /app/models
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.ml | nindent 12 }}
        {{- with .Values.sidecars.ml }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: models
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "fortresswaf.fullname" . }}-ml
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fortresswaf.fullname" . }}-dashboard
  labels:
    {{- include "fortresswaf.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fortresswaf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "fortresswaf.labels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: {{ include "fortresswaf.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}-dashboard:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: API_URL
              value: http://{{ include "fortresswaf.fullname" .}}-proxy:8443/api/v1
            - name: NODE_ENV
              value: production
            {{- with .Values.extraEnvVars.dashboard }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.dashboard | nindent 12 }}
        {{- with .Values.sidecars.dashboard }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
