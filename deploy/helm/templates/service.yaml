apiVersion: v1
kind: Service
metadata:
  name: {{ include "fortresswaf.fullname" . }}-proxy
  labels:
    {{- include "fortresswaf.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
  {{- with .Values.service.proxy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.proxy.type }}
  {{- with .Values.service.proxy.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.proxy.clusterIP }}
  clusterIP: {{ . }}
  {{- end }}
  {{- with .Values.service.proxy.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.proxy.ports.http }}
      targetPort: 8080
      protocol: TCP
      {{- with .Values.service.proxy.nodePorts.http }}
      nodePort: {{ . }}
      {{- end }}
    - name: https
      port: {{ .Values.service.proxy.ports.https }}
      targetPort: 8443
      protocol: TCP
      {{- with .Values.service.proxy.nodePorts.https }}
      nodePort: {{ . }}
      {{- end }}
    - name: admin
      port: {{ .Values.service.proxy.ports.admin }}
      targetPort: 8443
      protocol: TCP
      {{- with .Values.service.proxy.nodePorts.admin }}
      nodePort: {{ . }}
      {{- end }}
  selector:
    {{- include "fortresswaf.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
---
