# Number of FortressWAF proxy replicas
replicaCount: 2

# Global settings applied across all components
global:
  # Global Docker image registry
  imageRegistry: ""
  # Global image pull secrets
  imagePullSecrets: []
  # Global labels
  labels: {}
  # Global annotations
  annotations: {}

# Image configuration for the FortressWAF proxy
image:
  repository: fortresswaf/fortresswaf
  tag: "1.0.0"
  pullPolicy: IfNotPresent
  # Image pull secrets (overrides global)
  pullSecrets: []

# Service configuration for all components
service:
  proxy:
    type: ClusterIP
    ports:
      http: 80
      https: 443
      admin: 8443
    annotations: {}
    labels: {}
    # Set externalTrafficPolicy to Local to preserve client IP
    externalTrafficPolicy: ""
    # Load balancer source ranges
    loadBalancerSourceRanges: []
    # ClusterIP for the service (empty = auto-assigned)
    clusterIP: ""
    # NodePort values (when type is NodePort)
    nodePorts:
      http: ""
      https: ""
      admin: ""
  ml:
    type: ClusterIP
    ports:
      http: 8000
    annotations: {}
  dashboard:
    type: ClusterIP
    ports:
      http: 3000
    annotations: {}
  postgres:
    type: ClusterIP
    ports:
      postgres: 5432
  redis:
    type: ClusterIP
    ports:
      redis: 6379
  nats:
    type: ClusterIP
    ports:
      client: 4222
      http: 8222
  opensearch:
    type: ClusterIP
    ports:
      rest: 9200
      transport: 9300

# Ingress configuration for the dashboard
ingress:
  enabled: false
  className: ""
  # Annotations for the ingress controller
  annotations:
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/proxy-body-size: 100m
  # Hostname for the dashboard
  host: dashboard.fortresswaf.local
  # Path configuration
  path: /
  pathType: Prefix
  # TLS configuration
  tls:
    enabled: false
    secretName: fortresswaf-dashboard-tls
  # Additional ingress rules
  extraRules: []
  # Additional TLS hosts
  extraTls: []

# Application configuration
config:
  # Log level: debug, info, warn, error, fatal
  logLevel: info
  # Log format: json or text
  logFormat: json
  # Enable ML-based detection
  mlEnabled: true
  # Enable rate limiting
  ratelimitEnabled: true
  # Enable audit logging
  auditLogEnabled: true
  # Default action: allow or block
  defaultAction: allow
  # Anomaly scoring threshold (0 to disable)
  anomalyThreshold: 10
  # Sites configuration (list of protected upstreams)
  sites:
    - name: default
      domains:
        - "example.com"
      upstreams:
        - "http://app:3000"
      tlsEnabled: false
      autoCert: false
  # Custom configuration file content to merge
  customConfig: {}

# Secret configuration
secrets:
  # Database password (auto-generated if empty)
  dbPassword: ""
  # Redis password (auto-generated if empty)
  redisPassword: ""
  # OpenSearch admin password (auto-generated if empty)
  opensearchPassword: ""
  # JWT secret for admin API (auto-generated if empty)
  jwtSecret: ""
  # TLS certificates (base64 encoded)
  tls:
    cert: ""
    key: ""
  # Existing secret name (overrides individual values)
  existingSecretName: ""

# Persistence / volume configuration
persistence:
  # Enable persistence for stateful components
  enabled: true
  # Storage class for all volumes (empty = cluster default)
  storageClass: ""
  # Access modes
  accessMode: ReadWriteOnce
  # Size for each volume
  sizes:
    postgres: 10Gi
    redis: 5Gi
    opensearch: 50Gi
    fortress: 1Gi
    ml: 5Gi
  # Labels for PVCs
  labels: {}
  # Annotations for PVCs
  annotations: {}

# Autoscaling configuration for the proxy
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  # Custom metrics for autoscaling
  customMetrics: []
  # Behavior configuration
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60

# Pod security context
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: Always
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  seccompProfile:
    type: RuntimeDefault

# Resource limits and requests
resources:
  proxy:
    limits:
      cpu: 2
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  ml:
    limits:
      cpu: 4
      memory: 4Gi
    requests:
      cpu: 1
      memory: 1Gi
  dashboard:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  postgres:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  redis:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi
  nats:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  opensearch:
    limits:
      cpu: 2
      memory: 8Gi
    requests:
      cpu: 1
      memory: 4Gi

# Node selector for pod placement
nodeSelector: {}
#  disktype: ssd

# Tolerations for pod scheduling
tolerations: []

# Affinity / anti-affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: fortresswaf
              app.kubernetes.io/component: proxy
          topologyKey: kubernetes.io/hostname
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 50
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: fortresswaf
              app.kubernetes.io/component: ml-engine
          topologyKey: kubernetes.io/hostname

# RBAC configuration
rbac:
  create: true
  # Cluster roles (needed for watching ingresses, etc.)
  clusterRole: true
  # Additional rules
  extraRules: []
  # ClusterRole rules
  clusterRules:
    - apiGroups: [""]
      resources: ["nodes", "endpoints", "services", "pods"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["networking.k8s.io"]
      resources: ["ingresses"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["events"]
      verbs: ["create", "patch"]

# ServiceAccount configuration
serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true

# NetworkPolicy configuration
networkPolicy:
  enabled: false
  # Default deny ingress/egress policy
  defaultDeny:
    ingress: true
    egress: true
  # Ingress rules
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 80
        - port: 443
        - port: 8443
  # Egress rules
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 53
          protocol: UDP
        - port: 443
        - port: 80
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: fortresswaf
  # Additional policies
  extraPolicies: []

# PodDisruptionBudget configuration
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

# Pod lifecycle hooks
lifecycle:
  preStop:
    exec:
      command:
        - /bin/sh
        - -c
        - sleep 10 && /usr/local/bin/fortressctl drain

# Pod priority class name
priorityClassName: ""

# Pod topology spread constraints
topologySpreadConstraints: []

# Termination grace period (seconds)
terminationGracePeriodSeconds: 60

# Additional environment variables for all components
extraEnv: []

# Additional environment variables for specific components
extraEnvVars:
  proxy: []
  ml: []
  dashboard: []
  postgres: []
  redis: []
  nats: []
  opensearch: []

# Init containers
initContainers:
  proxy: []
  ml: []
  dashboard: []

# Sidecar containers
sidecars:
  proxy: []
  ml: []
  dashboard: []

# Additional volumes and mounts
extraVolumes: []
extraVolumeMounts: []

# Prometheus operator ServiceMonitor
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  annotations: {}
  relabelings: []
  metricRelabelings: []

# Grafana dashboard configuration
grafana:
  enabled: false
  # Namespace for the dashboard ConfigMap
  namespace: ""
  # Dashboard labels
  labels:
    grafana_dashboard: "1"
  # Dashboard annotations
  annotations: {}

# Pod labels and annotations
podLabels: {}
podAnnotations: {}

# Name override for resources
nameOverride: ""
fullnameOverride: ""
