global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'fortresswaf-proxy'
    static_configs:
      - targets: ['fortress-proxy:8080']
    metrics_path: /metrics
    scheme: http

  - job_name: 'fortresswaf-ml'
    static_configs:
      - targets: ['ml-engine:8000']
    metrics_path: /metrics
    scheme: http

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
