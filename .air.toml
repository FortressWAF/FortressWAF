# Air configuration for Go hot-reload in development
root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/fortress-proxy"
  cmd = "go build -gcflags='all=-N -l' -o ./tmp/fortress-proxy ./cmd/proxy"
  delay = 1000
  exclude_dir = [
    "assets", "tmp", "vendor", "dashboard", "ml-engine",
    "deploy", "docs", "tests", "tools", "scripts", "rules",
    "node_modules", ".git", "coverage", "bin"
  ]
  exclude_file = []
  exclude_regex = ["_test\\.go$", "\\.tmp$"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "CONFIG_PATH=/etc/fortresswaf/config.yaml ./tmp/fortress-proxy"
  include_dir = []
  include_ext = ["go", "yaml", "yml"]
  kill_delay = "2s"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
